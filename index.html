<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Plant Care Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#10b981">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js" defer></script>
    <script type="module" src="app.js"></script>
</head>
<body>

    <header>
        <h1>🪴 My Plant Care</h1>
    </header>

    <main class="container">
        <section id="dashboard" class="dashboard-area" style="display: none;">
            <h2 class="section-title">⚠️ 今日の要チェック</h2>
            <div id="urgent-plant-list" class="urgent-carousel"></div>
        </section>

        <section id="plant-registration" class="card primary-section">
            <h2>🌱 新規登録</h2>
            <form id="add-plant-form">
                <label for="plant-name">ニックネーム:</label>
                <input type="text" id="plant-name" required placeholder="例：ガジュちゃん">
                
                <label for="species-select">植物種:</label>
                <select id="species-select" required></select>
                
                <label for="last-watered">直近の水やり日:</label>
                <div class="input-with-button">
                    <input type="date" id="last-watered" required>
                    <button type="button" id="set-today-button" class="action-button tertiary">今日</button>
                </div>
                
                <p id="next-watering-preview" class="form-preview-message">植物と日付を選択してください。</p>
                
                <button type="submit" class="action-button primary">カルテを作成</button>
            </form>
        </section>

        <section id="plant-card-list">
            <div class="list-header">
                <h2>📝 登録済みの植物</h2>
                <div id="quick-sort-buttons" class="quick-sort-buttons"></div>
            </div>
            <div id="plant-cards-container"></div>
        </section>

        <section id="settings-section" class="card secondary-section" style="margin-bottom: 100px;">
            <h2>⚙️ アプリ設定</h2>
            <div class="control-group">
                <label for="global-season-select">表示モード (季節):</label>
                <select id="global-season-select">
                    <option value="AUTO">📅 自動 (現在の月)</option>
                    <option value="SPRING">🌸 春</option>
                    <option value="SUMMER">🌻 夏</option>
                    <option value="AUTUMN">🍁 秋</option>
                    <option value="WINTER">❄️ 冬</option>
                </select>
            </div>
            <div class="data-controls">
                <button id="export-data-button" class="action-button secondary">📤 バックアップ保存</button>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="#dashboard" class="nav-item active">🏠 <span>ホーム</span></a>
        <a href="#plant-registration" class="nav-item">➕ <span>登録</span></a>
        <a href="#settings-section" class="nav-item">⚙️ <span>設定</span></a>
    </nav>
    
    <div id="details-modal" class="modal">...</div>
    <div id="water-type-modal" class="modal">...</div>
</body>
</html>
